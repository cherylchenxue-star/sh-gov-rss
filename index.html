和国价格法》《中华人民共和国学前教育法》《上海市学前教育与托育服务条例》《国家发展改革委 教育部 财政部关于完善幼儿园收费政策的通知》，结合本市实际，制…","tags":["教育","养老服务"]},{"id":"sh-stcsm--4848977987331469022","title":"关于开展2026年度上海市科技创新券服务机构综合评价工作的通知","link":"https://stcsm.sh.gov.cn/zwgk/tzgs/zhtz/20260409/e305cb37a7cc4c31a9abefbc586ce72d.html","date":"2026-04-09","sourceId":"sh-stcsm","source":"上海市科委","summary":"各有关单位： 根据《上海市科技创新券管理办法》（沪科规〔2025〕6号）、《上海市科技创新券服务机构管理实施细则》（沪科规〔2026〕1号），现组织开展2026年度上海市科技创新券服务机构综合评价工作，有关事项通知如下： 一、评价对象 本次评价对象为已入驻上海市科技创新券智能化工作平台（以下简称“创新券平台”）满2年的服务机构。 二、评价周期 评价周期为2025年1月1日-2025年12月31日。 三、评价方式 评价采取“免申请”方式，按服务类别进行分类评价。服务类别包含技术转移转化服务（含科技金融服务）、技术研发服务、检验检测服务、科技咨询服务、科技创新资源开放共享服务。","tags":["金融科技","科技创新"]},{"id":"sh-fgw--4171635890678498290","title":"上海市发展和改革委员会关于车用汽、柴油价格的通知（2026年4月7日）","link":"http://fgw.sh.gov.cn/fgw_jggl/20260407/bd75260934ea47a095c006d989aec171.html","date":"2026-04-07","sourceId":"sh-fgw","source":"上海市发改委","summary":"各区发展改革委、中石化上海石油分公司、中石油上海销售分公司、中海油销售上海分公司： 根据国家发展改革委的有关通知，现就本市车用汽油和车用柴油价格等有关事项通知如下： 一、89号汽油和0号柴油最高零售价格每吨分别为11070元和9970元。各标号汽、柴油最高零售价格详见附件。 各成品油零售企业可在不超过最高零售价格的前提下，自主制定具体零售价格。 二、汽、柴油的最高供应价格和最高批发价格的作价办法仍按市发展改革委沪发改价商〔2008〕019号文件的有关规定执行。 三、上述调整后的价格自2026年4月7日24时起执行。 特此通知。","tags":["商贸消费","能源电力"]},{"id":"sh-fgw--7275060047480273172","title":"关于我市居民瓶装液化石油气基准价的通知","link":"http://fgw.sh.gov.cn/fgw_jggl/20260403/ec057ff195ed420fab5e6110e4b5a71c.html","date":"2026-04-03","sourceId":"sh-fgw","source":"上海市发改委","summary":"各居民瓶装液化石油气经营企业： 根据《关于完善我市居民瓶装液化石油气价格机制有关事项的通知》（沪发改价管〔2023〕16号）等文件的有关规定及液化石油气上游价格变动情况，自4月10日零点起，本市14.5kg包装规格居民瓶装液化石油气基准价调整为每瓶117元，其他包装规格基准价按每瓶实际容量折算。经营企业可在上浮不超过基准价20%范围内自主制定价格，下浮不限。 各经营企业应合法经营，严禁价格联盟、哄抬价格、实施垄断协议、滥用市场支配地位等价格违法行为。 特此通知。 上海市发展和改革委员会 2026年4月3日","tags":[]},{"id":"sh-stcsm-6983112015613766086","title":"关于《关于支持外资企业高能级项目落地 提升生物医药产业能级的若干措施（征求意见稿）》 公开征求意见的公告","link":"https://stcsm.sh.gov.cn/zwgk/yjzjzx/yjzjzx/20260403/632b41ebed3f44ee9e892b5d79a2981b.html","date":"2026-04-03","sourceId":"sh-stcsm","source":"上海市科委","summary":"为进一步促进生物医药外资企业在沪发展，推动投资规模大、产业带动能力强的高能级项目落地，我委研究编制了《关于支持外资企业高能级项目落地 提升生物医药产业能级的若干措施（征求意见稿）》，现向社会公开征求意见，并就有关事宜公告如下： 一、欢迎有关单位和社会各界人士通过电子邮件提出意见建议，邮件标题请注明“规范性文件征求意见”字样。 电子邮件：syc01@stcsm.sh.gov.cn 二、征求意见截止日期为 2026年4月12日 。 感谢您的参与和支持！ 上海市科学技术委员会 2026年4月3日 【相关附件】 关于支持外资企业高能级项目落地 提升生物医药产业能级的若干措施（征求意见稿）.pdf","tags":["生物医药"]},{"id":"sh-stcsm-6662597459212739567","title":"关于《上海市“十五五”期间享受科技创新进口税收政策的科研机构名单核定办法（征求意见稿）》 公开征求意见的公告","link":"https://stcsm.sh.gov.cn/zwgk/yjzjzx/yjzjzx/20260403/efbbaea8a1dd49ee8930ac97902f89c0.html","date":"2026-04-03","sourceId":"sh-stcsm","source":"上海市科委","summary":"为贯彻落实《关于“十五五”期间支持科技创新进口税收优惠政策的通知》（财关税〔2026〕7号）和《关于“十五五”期间支持科技创新进口税收优惠政策管理办法的通知》（财关税〔2026〕8号），核定享受科技创新进口税收优惠政策的科研机构名单，市科委会同相关部门研究起草《上海市“十五五”期间享受科技创新进口税收政策的科研机构名单核定办法（征求意见稿）》，现向社会公开征求意见。 一、有关单位和社会各界人士可以通过电子邮件方式提出意见建议，邮件标题请注明“规范性文件征求意见”字样。 电子邮件：ztc2024@stcsm.sh.gov.cn 二、征求意见截止日期为 2026年4月15日 。","tags":["科技创新"]},{"id":"sh-stcsm-3647261095937193433","title":"关于2026年度沪滇科技协同创新项目立项的通知","link":"https://stcsm.sh.gov.cn/zwgk/tzgs/gsgg/bsgsgg/kjjhxmjggb/20260331/00d4a946129e47829540efaca4ed198d.html","date":"2026-04-01","sourceId":"sh-stcsm","source":"上海市科委","summary":"沪科〔2026〕61号 各有关单位： 根据《上海市科学技术委员会关于发布2026年度沪滇科技协同创新项目申报指南的通知》（沪科指南〔2025〕40号）要求，经项目申报、形式审查、专家评审、立项公示等程序，现对《依托云南特色药用资源的放射性肠炎与炎症性肠病（IBD）创新药物研发及机制研究》等5个项目予以立项，市科委资助1000万元，其中2025年拨款800万元。请各项目承担单位和项目负责人做好项目组织实施和管理工作，确保按期完成项目研究任务目标。 特此通知。","tags":["科技创新"]},{"id":"sh-stcsm--5806608161915528669","title":"关于开展2026年度上海市技术合同认定登记监督抽查工作的通知","link":"https://stcsm.sh.gov.cn/zwgk/tzgs/zhtz/20260331/876c9d75128a4a44a9ad1c41aaf3a23c.html","date":"2026-03-31","sourceId":"sh-stcsm","source":"上海市科委","summary":"沪科〔2026〕59号 各相关单位： 根据《上海市技术市场条例》《上海市优化营商环境条例》等要求，市科委将开展2026年度上海市技术合同认定登记监督抽查工作，现将有关事项通知如下: 一、监督抽查范围 1. 抽查对象。2023年1月1日至2025年12月31日期间，已取得《上海市技术合同认定登记审核证明》的技术合同登记主体。 2. 组织实施。由上海市技术市场管理办公室统一组织实施。 3. 抽查要求。对同一登记主体，年度内监督抽查频次不超过1次。抽查比例按登记主体总数0.3%的比例抽取，共抽取40家。本年度重点抽查涉及软件类大额技术合同的登记主体。","tags":[]},{"id":"sh-fgw-6685495756497715952","title":"上海市发展改革委关于开展2026年度工程咨询单位监督检查工作的通知","link":"http://fgw.sh.gov.cn/fgw_gdzctz/20260330/49690fab4cc245c4a94858fd19f90837.html","date":"2026-03-30","sourceId":"sh-fgw","source":"上海市发改委","summary":"上海市工程咨询行业协会、本市各工程咨询单位： 根据《工程咨询行业管理办法》（国家发展改革委2017年第9号令）、《关于印发《上海市市场监管领域部门联合抽查事项清单（第二版）》的通知》（沪市监信用［2023］566号）的相关规定，为加强本市工程咨询单位的管理，规范从业行为，现就2026年度工程咨询单位监督检查工作通知如下： 一、检查目的 通过对工程咨询单位开展监督检查、联合抽查，进一步规范本市工程咨询行业单位及其人员执业行为，加强诚信建设，促进工程咨询业高质量发展，切实发挥工程咨询在投资决策、项目实施和经济社会发展中的重要作用。","tags":[]},{"id":"sh-stcsm-4632327454999324130","title":"2026年清明节期间上海市科技政务服务中心受理窗口对外接待服务时间调整通知","link":"https://stcsm.sh.gov.cn/zwgk/tzgs/qttzgs/20260330/899e9fca6d264fb8903d3cf4a54fa349.html","date":"2026-03-30","sourceId":"sh-stcsm","source":"上海市科委","summary":"根据《国务院办公厅关于2026年部分节假日安排的通知》（国办发明电〔2025〕7号）规定，上海市科技政务服务中心（徐汇区中山西路1525号技贸大厦一楼）2026年清明节期间4月4日（周六）至4月6日（周一）放假调休，共3天。4月7日(周二)起正常对外接待。 服务时间：每周一至周五9:00-16:30（最晚取号时间16:15） 请广大市民朋友合理安排办理业务的时间与方式，建议优先通过“一网通办”总门户、随申办APP等渠道提前进行线上预约。 上海市科学技术委员会 2026年3月30日","tags":[]},{"id":"sh-stcsm-9085680649263454866","title":"关于报告我市社会力量设立科学技术奖情况的通知","link":"https://stcsm.sh.gov.cn/zwgk/tzgs/zhtz/20260326/f243428912d64901b7520d3ce8b5bfed.html","date":"2026-03-26","sourceId":"sh-stcsm","source":"上海市科委","summary":"各有关单位： 为了鼓励、引导和推动本市社会力量设立科学技术奖（以下简称“社会科技奖”）规范化发展，根据《社会力量设立科学技术奖管理办法》（国科发奖〔2023〕11号）（以下简称《办法》）的规定，请各有关单位及时书面报告设立科学技术奖情况。在《办法》发布前已经设立的社会科技奖，需重新报告。有关事项通知如下。 1.本通知所称社会科技奖是指社会组织或者个人利用非财政性经费，在上海市设立，奖励我市在基础研究、应用研究、技术开发以及推进科技成果转化应用等活动中为促进科技进步做出突出贡献的个人或组织的经常性科学技术奖。 2.书面报告由社会科技奖设奖者或者承办机构提供。","tags":["科技创新"]},{"id":"sh-fgw-8721268533813435471","title":"关于下达本市2026年节能减排专项资金和超长期特别国债资金安排计划（第五批）的通知","link":"http://fgw.sh.gov.cn/fgw_zyjyhhjbh/20260325/940f87eb8b57445a93b509bc37aa4bed.html","date":"2026-03-25","sourceId":"sh-fgw","source":"上海市发改委","summary":"市商务委、市生态环境局、市交通委、市绿化市容局、市农业农村委： 你们报来的资金使用计划申请函（沪商市场〔2026〕66号，沪商商贸〔2026〕68号，沪交货〔2026〕109号，沪环函〔2026〕13号，沪绿容〔2026〕28、29号，沪农委〔2026〕43号）及有关材料已收悉。经研究，现将资金安排计划下达给你们，共8项，安排市节能减排专项资金95126.7415万元，2026年超长期特别国债36341.105292万元。","tags":["节能环保","农业","商贸消费","交通物流"]},{"id":"sh-fgw--800156727537382169","title":"上海市发展和改革委员会关于车用汽、柴油价格 tags":["中小企业"]},{"id":"sh-sheitc-zxzj-5505914865233117116","title":"上海市经济信息化委关于组织2025年上海市促进产业 高质量发展专项资金智能工厂领域项目申报的通知","link":"https://www.sheitc.sh.gov.cn/cyfz/20250811/df61f7d5d6f346b7bff43cba465ae3d6.html","date":"2025-08-11","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"各区经委（商务委）、科委、有关单位： 为加强高端产业引领，加快现代化产业体系构建，充分发挥智能制造推动上海经济高质量发展核心驱动力作用，着力提升本市制造业智能化水平。市经济信息化委制定了《上海市促进产业高质量发展专项资金智能工厂领域项目指南》，现印发你单位。请按照申报指南要求，组织本领域或区域符合条件的企业单位开展项目申报工作。","tags":["智能制造"]},{"id":"sh-sheitc-zxzj-1304664644235800524","title":"上海市经济信息化委关于开展2025年度上海市工业通信业节能减排和合同能源管理专项资金项目 （能源管理中心）申报工作的通知","link":"https://www.sheitc.sh.gov.cn/cyfz/20250305/e498286e4ecc4c3ba7f84b936398fe12.html","date":"2025-03-05","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"有关单位： 为贯彻落实《上海市节能减排（应对气候变化）专项管理资金管理办法（沪发改规范〔 2021〕5号）》和《上海市工业通信 业节能减排和合同能源管理专项扶持办法》（沪经信规范〔 2023〕 5号），鼓励能源管理中心建设，现组织开展2025年度上海市工 业通信业节能减排和合同能源管理专项资金项目（能源管理中心） 申报工作，并将有关事项通知如下： 一、专项资金支持范围 能源管理中心建设项目主要支持本市工行业用能单位、数据中心、园区用于能源管理中心建设中能源计量、数据采集、信息上传等内容的投资。","tags":["节能环保","能源电力"]},{"id":"sh-sheitc-zxzj-4591662105018859103","title":"上海市经济信息化委关于开展2025年度上海市工业通信业节能减排和合同能源管理专项资金项目申报工作的通知","link":"https://www.sheitc.sh.gov.cn/cyfz/20250305/168c72d3b7c64c10b0422fd057529265.html","date":"2025-03-05","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"有关单位： 为贯彻落实《上海市节能减排（应对气候变化）专项资金管理办法》（沪发改规范〔 2021〕5号）和《上海市工业通信业节能减排和合同能源管理专项扶持办法》（沪经信规范〔2023〕5号），推动企业积极开展绿色低碳化改造、建立绿色制造体系、提升能源管理能力，现组织开展2025年度上海市工业通信业节能减排和合同能源管理专项 资金 项目申报工作，并将有关事项通知如下： 一、专项资金支持范围 专项资金主要支持绿色低碳工艺升级和新技术应用、节能技术改造、合同能源管理、能源管理体系、绿色制造体系示范、能源审计和节能诊断服务（能源管理中心、清洁生产、清洁生产服务申报通知另行发布）。","tags":["节能环保","能源电力"]},{"id":"sh-sheitc-zxzj-2928266115620319536","title":"上海市经济信息化委关于开展2025年度上海市工业通信业节能减排和合同能源管理专项资金项目（清洁生产）申报工作的通知","link":"https://www.sheitc.sh.gov.cn/cyfz/20250305/dcb0c76db4204db2a77fdcca6c37c579.html","date":"2025-03-05","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"有关单位： 为贯彻落实《上海市节能减排（应对气候变化）专项资金管理办法》（沪发改规范〔 2021〕5号）和《上海市工业通信业节能减排和合同能源管理专项扶持办法》（沪经信规范〔2023〕5号），进一步鼓励和引导企业加大清洁生产改造投入，实现“节能、降耗、减污、增效”的目标，现组织开展2025年度上海市清洁生产专项资金项目申报工作，并将有关事项通知如下： 一、支持范围 （一）清洁生产 按照《上海市鼓励企业实施清洁生产专项扶持评价细则》（附件 1）规定，完成所有改造项目且通过审核验收的清洁生产项目。","tags":["节能环保","能源电力"]},{"id":"sh-sheitc-zxzj-3688408098590655669","title":"上海市经济信息化委关于开展2025年度上海市工业通信业用能设备更新专项扶持资金项目申报工作的通知","link":"https://www.sheitc.sh.gov.cn/cyfz/20250214/3746a67bfcee4e12927242056f5f426f.html","date":"2025-02-14","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"有关单位： 为贯彻落实《上海市节能减排（应对气候变化）专项资金管理办法（沪发改规范〔 2021〕5号）》和《上海市工业通信业用能设备更新专项扶持实施细则》（沪经信规 范 〔 2025〕1号），进一步推进本市工业通信业用能设备更新工作，现组织开展2025年度上海市工业通信业用能设备更新专项扶持资金项目申报工作，并将有关事项通知如下： 一、专项资金支持范围 （一）支持本市工业通信业企业采购 1级能效、2级能效及符合《重点用能产品设备能效先进水平、节能水平和准入水平》中节能水平及以上的用能设备。","tags":["节能环保"]},{"id":"sh-sheitc-zxzj-3906906818461222869","title":"2024年上海市中小企业发展专项资金分配结果、管理办法、操作流程图、绩效目标表","link":"https://www.sheitc.sh.gov.cn/bmys/20250213/5fbe70bf5a304e38b87334505892354e.html","date":"2025-02-13","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"附件：上海市中小企业发展专项资金2024年分配结果.pdf 附件：上海市中小企业发展专项资金绩效目标表.pdf 附件：上海市中小企业发展专项资金操作流程图.pdf 附件：上海市中小企业发展专项资金管理办法.pdf [返回] 【市民留言】","tags":["中小企业"]},{"id":"sh-sheitc-zxzj-909388610077860903","title":"上海市经济信息化委关于开展2025年上海市中小企业发展专项资金项目申报工作的通知","link":"https://www.sheitc.sh.gov.cn/zxqy/20250108/48756f44454d43bdb62ae0eb8b43446b.html","date":"2025-01-08","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"各区经委（商务委、科经委、新工办）、有关单位： 为贯彻《上海市促进中小企业发展条例》，支持本市中小企业高质量发展，根据《上海市中小企业发展专项资金管理办法》，现就开展 2025年度上海市中小企业发展专项资金项目申报工作的有关事项通知如下： 一、支持范围和内容 符合 2025年度上海市中小企业发展专项资金项目指南（以下简称“指南”）（详见附件1）的支持领域。","tags":["中小企业"]},{"id":"sh-sheitc-zxzj--7720304429701524554","title":"关于向社会公开征求《上海市中小企业发展专项资金管理办法（征求意见稿）》意见的通知","link":"https://www.sheitc.sh.gov.cn/gg/20240822/7e74d7eb4fe1485fb7b93667b3ce5a56.html","date":"2024-08-21","sourceId":"sh-sheitc-zxzj","source":"上海市经信委专项资金","summary":"为贯彻落实财政部 《中小企业发展专项资金管理办法》、 促进中小企业高质量发展要求，充分发挥财政资金引导带动作用，我委会同相关部门对《 上海市中小企业发展专项资金管理办法 》进行了修订，形成了《 上海市中小企业发展专项资金管理办法（征求意见稿） 》（以下简称《管理办法》）。 现公开面向社会征求意见，欢迎提出   </script>
  <script>
    (function() {
      const data = window.POLICY_DATA;

      const state = {
        filters: {
          search: '',
          sources: data.sources.map(s => s.id),
          tag: 'all',
          dateRange: 'all',
          customStart: '',
          customEnd: '',
        },
        sort: 'desc',
        pagination: {
          page: 1,
          pageSize: 20,
        },
      };

      function debounce(fn, ms) {
        let t;
        return function(...args) {
          clearTimeout(t);
          t = setTimeout(() => fn.apply(this, args), ms);
        };
      }

      function formatDateLabel(range) {
        const map = { 'all': '全部时间', '7d': '近7天', '30d': '近30天', '90d': '近90天', 'custom': '自定义' };
        return map[range] || range;
      }

      function getFilteredPolicies() {
        return data.policies.filter(p => {
          if (!state.filters.sources.includes(p.sourceId)) return false;
          if (state.filters.tag !== 'all' && !p.tags.includes(state.filters.tag)) return false;
          if (state.filters.dateRange !== 'all') {
            const policyDate = new Date(p.date);
            const now = new Date();
            if (state.filters.dateRange === 'custom') {
              if (state.filters.customStart && policyDate < new Date(state.filters.customStart)) return false;
              if (state.filters.customEnd && policyDate > new Date(state.filters.customEnd)) return false;
            } else {
              const days = { '7d': 7, '30d': 30, '90d': 90 }[state.filters.dateRange];
              const cutoff = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
              cutoff.setHours(0,0,0,0);
              if (policyDate < cutoff) return false;
            }
          }
          if (state.filters.search) {
            const q = state.filters.search.toLowerCase();
            const text = (p.title + ' ' + p.source + ' ' + p.summary + ' ' + p.tags.join(' ')).toLowerCase();
            if (!text.includes(q)) return false;
          }
          return true;
        }).sort((a, b) => {
          const da = new Date(a.date), db = new Date(b.date);
          return state.sort === 'desc' ? db - da : da - db;
        });
      }

      function renderStats() {
        const badgeContainer = document.getElementById('source-badges');
        badgeContainer.innerHTML = '';
        data.sources.forEach(s => {
          const count = data.policies.filter(p => p.sourceId === s.id).length;
          if (count > 0) {
            const badge = document.createElement('span');
            badge.className = 'inline-flex items-center px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-700 border border-gray-200';
            badge.textContent = s.name + ' ' + count;
            badgeContainer.appendChild(badge);
          }
        });
      }

      function renderSourceDropdown() {
        const container = document.getElementById('source-options');
        container.innerHTML = '';
        data.sources.forEach(s => {
          const label = document.createElement('label');
          label.className = 'flex items-center gap-2 px-3 py-2 hover:bg-gray-50 cursor-pointer rounded';
          label.innerHTML = `<input type="checkbox" value="${s.id}" class="source-checkbox w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" ${state.filters.sources.includes(s.id) ? 'checked' : ''}> <span class="text-sm text-gray-700">${s.name}</span>`;
          container.appendChild(label);
        });
      }

      function renderTagDropdown() {
        const container = document.getElementById('tag-options');
        container.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'tag-option w-full text-left px-3 py-2 rounded text-sm ' + (state.filters.tag === 'all' ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
        allBtn.textContent = '全部标签';
        allBtn.dataset.value = 'all';
        container.appendChild(allBtn);
        data.allTags.forEach(tag => {
          const btn = document.createElement('button');
          btn.className = 'tag-option w-full text-left px-3 py-2 rounded text-sm ' + (state.filters.tag === tag ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
          btn.textContent = tag;
          btn.dataset.value = tag;
          container.appendChild(btn);
        });
      }

      function renderActiveFilters() {
        const container = document.getElementById('active-filters');
        const list = document.getElementById('active-filters-list');
        list.innerHTML = '';
        let hasAny = false;

        if (state.filters.search) {
          hasAny = true;
          list.appendChild(createFilterTag('搜索: ' + state.filters.search, () => { state.filters.search = ''; document.getElementById('search-input').value = ''; renderAll(); }));
        }
        const isPartialSourceFilter = state.filters.sources.length > 0 && state.filters.sources.length < data.sources.length;
        if (isPartialSourceFilter) {
          hasAny = true;
          const sourceNames = state.filters.sources.map(id => {
            const s = data.sources.find(x => x.id === id);
            return s ? s.name : id;
          });
          list.appendChild(createFilterTag('来源: ' + sourceNames.join('、'), () => {
            state.filters.sources = data.sources.map(s => s.id);
            renderSourceDropdown();
            renderAll();
          }));
        }
        if (state.filters.tag !== 'all') {
          hasAny = true;
          list.appendChild(createFilterTag('标签: ' + state.filters.tag, () => { state.filters.tag = 'all'; renderTagDropdown(); renderAll(); }));
        }
        if (state.filters.dateRange !== 'all') {
          hasAny = true;
          let label = formatDateLabel(state.filters.dateRange);
          if (state.filters.dateRange === 'custom' && (state.filters.customStart || state.filters.customEnd)) {
            label += ' (' + (state.filters.customStart || '') + ' ~ ' + (state.filters.customEnd || '') + ')';
          }
          list.appendChild(createFilterTag(label, () => { state.filters.dateRange = 'all'; document.getElementById('custom-start').value = ''; document.getElementById('custom-end').value = ''; renderAll(); }));
        }

        container.classList.toggle('hidden', !hasAny);
        const sourceBadge = document.getElementById('source-badge');
        sourceBadge.textContent = state.filters.sources.length;
        sourceBadge.classList.toggle('hidden', !isPartialSourceFilter);
        const tagBadge = document.getElementById('tag-badge');
        tagBadge.textContent = state.filters.tag === 'all' ? '0' : '1';
        tagBadge.classList.toggle('hidden', state.filters.tag === 'all');
      }

      function createFilterTag(text, onRemove) {
        const span = document.createElement('span');
        span.className = 'inline-flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded-full';
        span.innerHTML = `<span>${text}</span><button class="hover:text-blue-900 leading-none" aria-label="移除"><i class="fa fa-times"></i></button>`;
        span.querySelector('button').addEventListener('click', onRemove);
        return span;
      }

      function renderPolicyList() {
        const filtered = getFilteredPolicies();
        const sorted = filtered;
        const pageSize = state.pagination.page * state.pagination.pageSize;
        const paginated = sorted.slice(0, pageSize);
        const hasMore = sorted.length > paginated.length;

        const listEl = document.getElementById('policy-list');
        listEl.innerHTML = '';

        document.getElementById('result-count').textContent = `共 ${sorted.length} 条`;
        document.getElementById('empty-state').classList.toggle('hidden', paginated.length > 0);
        document.getElementById('load-more-container').classList.toggle('hidden', !hasMore);

        if (paginated.length === 0) return;

        paginated.forEach(item => {
          const li = document.createElement('li');
          li.className = 'px-4 sm:px-6 py-4 hover:bg-gray-50 transition';
          const summary = item.summary || '';
          const summaryHtml = summary ? `<p class="text-sm text-slate-600 line-clamp-2 sm:line-clamp-3 mt-1">${escapeHtml(summary)}</p>` : '';
          const tagsHtml = (item.tags && item.tags.length) ? `<div class="flex flex-wrap gap-1 mt-1">${item.tags.map(t => `<span class="tag-pill cursor-pointer inline-flex items-center px-2 py-0.5 rounded text-xs bg-emerald-50 text-emerald-700 border border-emerald-100 hover:bg-emerald-100 transition" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('')}</div>` : '';
          li.innerHTML = `
            <div class="flex flex-col gap-1">
              <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-1 sm:gap-2">
                <a href="${item.link}" target="_blank" class="text-base font-medium text-slate-800 hover:text-blue-600 transition line-clamp-2">${escapeHtml(item.title)}</a>
                <span class="text-sm text-slate-400 whitespace-nowrap shrink-0">${item.date}</span>
              </div>
              <div class="flex items-center gap-2 text-sm">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-blue-50 text-blue-700 border border-blue-100">${escapeHtml(item.source)}</span>
              </div>
              ${summaryHtml}
              ${tagsHtml}
            </div>
          `;
          listEl.appendChild(li);
        });
        // Bind tag click events
        listEl.querySelectorAll('.tag-pill').forEach(pill => {
          pill.addEventListener('click', () => {
            state.filters.tag = pill.dataset.tag;
            state.pagination.page = 1;
            renderTagDropdown();
            renderAll();
          });
        });
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function renderAll() {
        renderStats();
        renderActiveFilters();
        renderPolicyList();
      }

      function showToast(message, type = 'success') {
        let toast = document.getElementById('page-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.id = 'page-toast';
          toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm font-medium z-50 transition-opacity duration-300 opacity-0';
          document.body.appendChild(toast);
        }
        toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm font-medium z-50 transition-opacity duration-300 ' + (type === 'success' ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2500);
      }

      async function refreshFromRSS() {
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('fa-spin');
        try {
          const res = await fetch(data.rssLink + '?t=' + Date.now());
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const xmlText = await res.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(xmlText, 'application/xml');
          const parserError = doc.querySelector('parsererror');
          if (parserError) throw new Error('XML parse error');

          const sourceNameToId = {};
          data.sources.forEach(s => sourceNameToId[s.name] = s.id);

          const items = Array.from(doc.querySelectorAll('item'));
          const policies = [];
          const allTags = new Set();

          items.forEach(item => {
            const title = item.querySelector('title')?.textContent?.trim() || '';
            const link = item.querySelector('link')?.textContent?.trim() || '';
            const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
            const description = item.querySelector('description')?.textContent?.trim() || '';
            const sourceName = item.querySelector('source')?.textContent?.trim() || '';

            let summary = '';
            const brIdx = description.indexOf('<br/>');
            if (brIdx !== -1) {
              summary = description.slice(brIdx + 5).trim();
            } else if (description.startsWith('来源:')) {
              const lines = description.split(/[\n\r]+/);
              summary = lines.slice(1).join(' ').trim();
            } else {
              summary = description;
            }

            const d = new Date(pubDate);
            const dateStr = isNaN(d) ? '' : d.toISOString().slice(0, 10);

            const tags = Array.from(item.querySelectorAll('category')).map(c => c.textContent.trim()).filter(Boolean);
            tags.forEach(t => allTags.add(t));

            policies.push({
              id: link + '-' + hashCode(title),
              title,
              link,
              date: dateStr,
              sourceId: sourceNameToId[sourceName] || '',
              source: sourceName,
              summary,
              tags,
            });
          });

          data.policies = policies;
          data.allTags = Array.from(allTags).sort();
          data.meta.totalCount = policies.length;
          data.meta.updatedAt = new Date().toLocaleString('zh-CN', { hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');

          state.filters.sources = data.sources.map(s => s.id);
          state.filters.tag = 'all';
          state.filters.dateRange = 'all';
          state.filters.search = '';
          state.pagination.page = 1;

          document.getElementById('search-input').value = '';
          document.getElementById('search-clear').classList.add('hidden');
          document.getElementById('custom-start').value = '';
          document.getElementById('custom-end').value = '';

          renderTagDropdown();
          updateDateDropdownUI();
          updateSortDropdownUI();
          renderAll();
          showToast('数据已刷新', 'success');
        } catch (e) {
          console.error(e);
          showToast('刷新失败：' + (e.message || '无法加载 RSS'), 'error');
        } finally {
          icon.classList.remove('fa-spin');
        }
      }

      function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        return hash;
      }

      function bindEvents() {
        const searchInput = document.getElementById('search-input');
        const searchClear = document.getElementById('search-clear');
        const sourceBtn = document.getElementById('source-dropdown-btn');
        const sourcePanel = document.getElementById('source-dropdown-panel');
        const tagBtn = document.getElementById('tag-dropdown-btn');
        const tagPanel = document.getElementById('tag-dropdown-panel');
        const dateBtn = document.getElementById('date-dropdown-btn');
        const datePanel = document.getElementById('date-dropdown-panel');
        const sortBtn = document.getElementById('sort-dropdown-btn');
        const sortPanel = document.getElementById('sort-dropdown-panel');

        function closeAllPanels(except) {
          if (except !== 'source') sourcePanel.classList.add('hidden');
          if (except !== 'tag') tagPanel.classList.add('hidden');
          if (except !== 'date') datePanel.classList.add('hidden');
          if (except !== 'sort') sortPanel.classList.add('hidden');
        }

        searchInput.addEventListener('input', debounce(() => {
          state.filters.search = searchInput.value.trim();
          state.pagination.page = 1;
          searchClear.classList.toggle('hidden', !state.filters.search);
          renderAll();
        }, 200));
        searchClear.addEventListener('click', () => {
          searchInput.value = '';
          state.filters.search = '';
          searchClear.classList.add('hidden');
          state.pagination.page = 1;
          renderAll();
        });

        sourceBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = sourcePanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) sourcePanel.classList.remove('hidden');
        });
        document.getElementById('source-options').addEventListener('change', (e) => {
          if (e.target.classList.contains('source-checkbox')) {
            const val = e.target.value;
            if (e.target.checked) {
              if (!state.filters.sources.includes(val)) state.filters.sources.push(val);
            } else {
              state.filters.sources = state.filters.sources.filter(id => id !== val);
            }
            state.pagination.page = 1;
            renderAll();
          }
        });
        document.getElementById('source-select-all').addEventListener('click', () => {
          state.filters.sources = data.sources.map(s => s.id);
          renderSourceDropdown();
          state.pagination.page = 1;
          renderAll();
        });
        document.getElementById('source-clear').addEventListener('click', () => {
          state.filters.sources = [];
          renderSourceDropdown();
          state.pagination.page = 1;
          renderAll();
        });

        tagBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = tagPanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) tagPanel.classList.remove('hidden');
        });
        document.getElementById('tag-options').addEventListener('click', (e) => {
          if (e.target.classList.contains('tag-option')) {
            state.filters.tag = e.target.dataset.value;
            state.pagination.page = 1;
            renderTagDropdown();
            renderAll();
          }
        });

        dateBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = datePanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) datePanel.classList.remove('hidden');
        });
        datePanel.querySelectorAll('.date-option').forEach(btn => {
          btn.addEventListener('click', () => {
            state.filters.dateRange = btn.dataset.value;
            if (state.filters.dateRange !== 'custom') {
              document.getElementById('custom-start').value = '';
              document.getElementById('custom-end').value = '';
              state.filters.customStart = '';
              state.filters.customEnd = '';
            }
            state.pagination.page = 1;
            renderAll();
            updateDateDropdownUI();
          });
        });
        document.getElementById('custom-start').addEventListener('change', (e) => {
          state.filters.dateRange = 'custom';
          state.filters.customStart = e.target.value;
          state.pagination.page = 1;
          renderAll();
          updateDateDropdownUI();
        });
        document.getElementById('custom-end').addEventListener('change', (e) => {
          state.filters.dateRange = 'custom';
          state.filters.customEnd = e.target.value;
          state.pagination.page = 1;
          renderAll();
          updateDateDropdownUI();
        });

        sortBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const willShow = sortPanel.classList.contains('hidden');
          closeAllPanels();
          if (willShow) sortPanel.classList.remove('hidden');
        });
        sortPanel.querySelectorAll('.sort-option').forEach(btn => {
          btn.addEventListener('click', () => {
            state.sort = btn.dataset.value;
            state.pagination.page = 1;
            renderAll();
            updateSortDropdownUI();
          });
        });

        document.addEventListener('click', () => {
          closeAllPanels();
        });

        // Reset
        document.getElementById('reset-btn').addEventListener('click', () => {
          state.filters.search = '';
          state.filters.sources = data.sources.map(s => s.id);
          state.filters.tag = 'all';
          state.filters.dateRange = 'all';
          state.filters.customStart = '';
          state.filters.customEnd = '';
          state.sort = 'desc';
          state.pagination.page = 1;
          searchInput.value = '';
          searchClear.classList.add('hidden');
          document.getElementById('custom-start').value = '';
          document.getElementById('custom-end').value = '';
          renderSourceDropdown();
          renderTagDropdown();
          updateDateDropdownUI();
          updateSortDropdownUI();
          renderAll();
        });

        // Clear all filters
        document.getElementById('clear-all-filters').addEventListener('click', () => {
          state.filters.search = '';
          state.filters.sources = data.sources.map(s => s.id);
          state.filters.tag = 'all';
          state.filters.dateRange = 'all';
          state.filters.customStart = '';
          state.filters.customEnd = '';
          state.pagination.page = 1;
          searchInput.value = '';
          searchClear.classList.add('hidden');
          document.getElementById('custom-start').value = '';
          document.getElementById('custom-end').value = '';
          renderSourceDropdown();
          renderTagDropdown();
          updateDateDropdownUI();
          renderAll();
        });

        document.getElementById('empty-clear-btn').addEventListener('click', () => {
          document.getElementById('clear-all-filters').click();
        });

        // Refresh
        document.getElementById('refresh-btn').addEventListener('click', () => {
          refreshFromRSS();
        });

        // Load more
        document.getElementById('load-more-btn').addEventListener('click', () => {
          state.pagination.page += 1;
          renderPolicyList();
        });
      }

      function updateDateDropdownUI() {
        document.querySelectorAll('.date-option').forEach(btn => {
          const active = btn.dataset.value === state.filters.dateRange;
          btn.className = 'date-option w-full text-left px-3 py-2 rounded text-sm ' + (active ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
        });
      }

      function updateSortDropdownUI() {
        document.querySelectorAll('.sort-option').forEach(btn => {
          const active = btn.dataset.value === state.sort;
          btn.className = 'sort-option w-full text-left px-3 py-2 rounded text-sm ' + (active ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-100');
        });
      }

      renderSourceDropdown();
      renderTagDropdown();
      bindEvents();
      renderAll();
    })();
  </script>
</body>
</html>
